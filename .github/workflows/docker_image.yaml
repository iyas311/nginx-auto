name: Build Images and Push

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
        
      - name: Get code
        uses: actions/checkout@v4
        with:
           fetch-depth:  0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Snyk on backend
        run: |
          npm install -g snyk
          cd backend
          snyk test --file=requirements.txt --sarif-file-output=../snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload Snyk backend results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
  
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # BUILD
      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frotend

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      - name: Build nginx
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx:latest ./nginx

      # TAG VERSION
      - name: Tag frontend
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/frontend:latest ${{ secrets.DOCKER_USERNAME }}/frontend:v1.1.0

      - name: Tag backend
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/backend:latest ${{ secrets.DOCKER_USERNAME }}/backend:v1.1.0

      - name: Tag nginx
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/nginx:latest ${{ secrets.DOCKER_USERNAME }}/nginx:v1.1.0

      # - name: Scan the image of nginx
      #   uses: aquasecurity/trivy-action@v0.20.0
      #   with:
      #     image-ref: ${{ secrets.DOCKER_USERNAME }}/nginx:v1.1.0
      #     format: table
      #     exit-code: 0
      #     severity: HIGH,CRITICAL


      - name: Run Snyk to check Docker images for vulnerabilities
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/nginx:v1.1.0
          args: --severity-threshold=high --sarif-file-output=snyk-docker.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-docker.sarif
        continue-on-error: true

      # - name: Scan the image of frontend
      #   uses: aquasecurity/trivy-action@v0.20.0
      #   with:
      #     image-ref: ${{ secrets.DOCKER_USERNAME }}/frontend:v1.1.0
      #     format: table
      #     exit-code: 0
      #     severity: HIGH,CRITICAL

      # - name: Scan the image of backend
      #   uses: aquasecurity/trivy-action@v0.20.0
      #   with:
      #     image-ref: ${{ secrets.DOCKER_USERNAME }}/backend:v1.1.0
      #     format: table
      #     exit-code: 0
      #     severity: HIGH,CRITICAL

      # # PUSH
      # - name: Push images
      #   run: |
      #     docker push ${{ secrets.DOCKER_USERNAME }}/frontend:v1.1.0
      #     docker push ${{ secrets.DOCKER_USERNAME }}/backend:v1.1.0
      #     docker push ${{ secrets.DOCKER_USERNAME }}/nginx:v1.1.0

      # SLACK NOTIFICATIONS
      - name: Slack Notification - Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Build & Deployment Success"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:* All images built and pushed successfully 🚀"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View SonarQube"
                      },
                      "url": "${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ github.repository }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notification - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Build Pipeline Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Issue:* Check the workflow logs for details"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View SonarQube"
                      },
                      "url": "${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ github.repository }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK