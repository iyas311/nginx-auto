name: Build Images and Push

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
        
      - name: Get code
        uses: actions/checkout@v4
        with:
           fetch-depth:  0

      - name: Run Snyk on backend
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/requirements.txt --sarif-file-output=snyk.sarif
              

      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # BUILD
      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frotend

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      - name: Build nginx
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx:latest ./nginx

      # TAG VERSION
      - name: Tag frontend
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/frontend:latest ${{ secrets.DOCKER_USERNAME }}/frontend:v1.1.0

      - name: Tag backend
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/backend:latest ${{ secrets.DOCKER_USERNAME }}/backend:v1.1.0

      - name: Tag nginx
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/nginx:latest ${{ secrets.DOCKER_USERNAME }}/nginx:v1.1.0

      # - name: Scan the image of nginx
      #   uses: aquasecurity/trivy-action@v0.20.0
      #   with:
      #     image-ref: ${{ secrets.DOCKER_USERNAME }}/nginx:v1.1.0
      #     format: table
      #     exit-code: 0
      #     severity: HIGH,CRITICAL


      - name: Run Snyk to check Docker images for vulnerabilities
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/nginx:v1.1.0
          args: --severity-threshold=high --sarif-file-output=snyk-docker.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-docker.sarif


      - name: Scan the image of frontend
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/frontend:v1.1.0
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL


      - name: Scan the image of backend
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/backend:v1.1.0
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      # PUSH
      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:v1.1.0
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:v1.1.0
          docker push ${{ secrets.DOCKER_USERNAME }}/nginx:v1.1.0