name: Build Images and push

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend ./frotend

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend ./backend

      - name: Build nginx
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx ./nginx

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend
          docker push ${{ secrets.DOCKER_USERNAME }}/nginx